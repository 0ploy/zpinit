name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # All actions pinned to commit SHAs (not tags) so a compromised
      # upstream cannot inject code into our release pipeline. Bump
      # deliberately when upgrading; record the human-readable version
      # in the trailing comment.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          for ARCH in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=${ARCH} \
              go build -trimpath -ldflags "${LDFLAGS}" -o zpinit-linux-${ARCH} ./cmd/zpinit
            CGO_ENABLED=0 GOOS=linux GOARCH=${ARCH} \
              go build -trimpath -ldflags "${LDFLAGS}" -o zpctl-linux-${ARCH} ./cmd/zpctl
          done

      - name: Generate checksums
        run: |
          sha256sum \
            zpinit-linux-amd64 zpinit-linux-arm64 \
            zpctl-linux-amd64 zpctl-linux-arm64 \
            > checksums.txt
          cat checksums.txt

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/0ploy/zpinit
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      - name: Build release body
        run: |
          cat > release-body.md << 'HEADER'
          ## Use in your Dockerfile

          ```dockerfile
          COPY --from=ghcr.io/0ploy/zpinit:latest /usr/local/bin/zpinit /usr/local/bin/zpctl /usr/local/bin/
          ```

          Pin to this exact release with `ghcr.io/0ploy/zpinit:VERSION_TAG` (the tag at the top of this page).

          ## Try it standalone

          ```bash
          docker run --rm -it ghcr.io/0ploy/zpinit:VERSION_TAG sh
          # then: zpinit --version, zpinit --check-config /etc/zpinit, zpctl help
          ```

          ## Manual binary download

          Linux only. Pick the binary for your architecture below and verify against `checksums.txt`.

          HEADER

          # Inject the actual tag into the placeholder above.
          sed -i "s/VERSION_TAG/${GITHUB_REF_NAME}/g" release-body.md

          # Append the latest CHANGELOG section (skips the version heading
          # itself; that already appears as the GitHub release title).
          if [ -f CHANGELOG.md ]; then
            echo "---" >> release-body.md
            echo "" >> release-body.md
            awk '/^## /{if(found) exit; found=1; next} found{print}' CHANGELOG.md >> release-body.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body_path: release-body.md
          files: |
            zpinit-linux-amd64
            zpinit-linux-arm64
            zpctl-linux-amd64
            zpctl-linux-arm64
            checksums.txt
