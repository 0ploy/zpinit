name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Actions pinned to commit SHAs (not tags) so a compromised
      # upstream cannot inject code into our pipeline. Bump deliberately
      # when upgrading; record the human-readable version in the comment.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # need tags for `git describe` in `make build`
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - run: go build ./...
      # -race catches the data-race class the v0.3.1 review surfaced and
      # the cgroup/reload/watcher fan-out keeps inviting. The suite runs
      # in <10s, so race-mode is cheap insurance.
      - run: go test -race -count=1 ./...
      - run: go vet ./...
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "$out"; exit 1; fi
      - name: make build (verify ldflags apply)
        # Catches the class of bug where the -X path stops matching the
        # var path in cmd/*/main.go: the linker silently ignores the
        # flag and `version` stays "dev", producing a release whose
        # binaries report no version.
        run: |
          make build
          for BIN in bin/zpinit bin/zpctl; do
            VER=$(${BIN} -version)
            echo "${BIN} reports: ${VER}"
            if [ "${VER}" = "dev" ]; then
              echo "::error::Makefile ldflags not applied to ${BIN}; check -X main.version path"
              exit 1
            fi
          done

  integration:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - run: go test -race -count=1 -tags=integration ./test/integration/...
